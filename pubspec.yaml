name: store
description: "A new Flutter project."

publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'


# ------------------------ packages --------------------------- #

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider:
  # Network
  http:
  # Firebase
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_storage:
  # Loading
  flutter_spinkit:
  modal_progress_hud_nsn:
  shimmer:
  # Icons
  iconsax:
  cupertino_icons: ^1.0.6
  # local storage
  shared_preferences:
  # utils:
  intl:
  logger:
  url_launcher:
  connectivity:
  flutter_native_splash: 
  smooth_page_indicator: 
# ------------------------ End-packages --------------------------- #
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


# ------------------------ Local Assets --------------------------- #


  assets:
    - assets/images/logos/
    - assets/images/on_board/
    - assets/images/auth/
    - assets/images/categories/


# ------------------------ Local Fonts --------------------------- #

  fonts:
    - family: Poppins
      fonts:
          - asset: assets/fonts/Poppins-Bold.ttf
          - asset: assets/fonts/Poppins-ExtraBold.ttf
          - asset: assets/fonts/Poppins-SemiBold.ttf
          - asset: assets/fonts/Poppins-Medium.ttf
          - asset: assets/fonts/Poppins-Regular.ttf
            weight: 700    
  

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
